<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audibly — Frequency Trainer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Audibly</h1>
      <p class="subtitle">Frequency Training Tool</p>
    </header>

    <nav class="mode-tabs">
      <button class="tab-btn active" data-mode="explore">Explore</button>
      <button class="tab-btn" data-mode="guess">Guess</button>
      <button class="tab-btn" data-mode="competition">Competition</button>
    </nav>

    <!-- Shared volume control -->
    <div class="global-controls">
      <label class="control-label">
        Volume
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.33">
        <span class="slider-val" id="volume-val">33%</span>
      </label>
    </div>

    <!-- Explore panel -->
    <div class="mode-panel active" id="panel-explore">
      <div class="controls">
        <label class="control-label">
          Duration
          <input type="range" id="explore-duration" min="0.5" max="3" step="0.1" value="1.0">
          <span class="slider-val" id="explore-duration-val">1.0s</span>
        </label>
      </div>
      <p class="hint">Click any band to play that frequency.</p>
    </div>

    <!-- Guess panel -->
    <div class="mode-panel" id="panel-guess">
      <div class="controls">
        <label class="control-label">
          Duration
          <input type="range" id="guess-duration" min="0.5" max="3" step="0.1" value="1.0">
          <span class="slider-val" id="guess-duration-val">1.0s</span>
        </label>
        <button class="play-btn" id="guess-play">Play Random Frequency</button>
        <button class="replay-btn" id="guess-replay" disabled>Try Another</button>
      </div>
      <div id="guess-status" class="status-box"></div>
    </div>

    <!-- Competition panel -->
    <div class="mode-panel" id="panel-competition">
      <div id="comp-setup">
        <div class="controls">
          <label class="control-label">
            Tests
            <input type="range" id="comp-count" min="10" max="30" step="1" value="20">
            <span class="slider-val" id="comp-count-val">20</span>
          </label>
          <label class="control-label">
            Duration
            <input type="range" id="comp-duration" min="0.5" max="3" step="0.1" value="1.0">
            <span class="slider-val" id="comp-duration-val">1.0s</span>
          </label>
          <button class="play-btn" id="comp-start">Start Competition</button>
        </div>
      </div>
      <div id="comp-progress" class="hidden">
        <div class="comp-stats">
          <span>Question <strong id="comp-q-num">0</strong> / <strong id="comp-q-total">0</strong></span>
          <span class="stat-good">Correct <strong id="comp-correct">0</strong></span>
          <span class="stat-bad">Wrong <strong id="comp-wrong">0</strong></span>
          <span>Elapsed <strong id="comp-total-time">0.0s</strong></span>
          <button class="replay-btn" id="comp-replay" disabled>↺ Replay</button>
        </div>
      </div>
      <div id="comp-status" class="status-box"></div>
    </div>

    <!-- EQ Visualizer (shared across all modes) -->
    <div class="eq-container">
      <div class="eq-bands" id="eq-bands"></div>
    </div>
  </div>

  <!-- Results modal -->
  <div class="modal-overlay hidden" id="results-modal">
    <div class="modal">
      <h2>Results</h2>
      <div id="results-content"></div>
      <button class="play-btn" id="results-close">New Competition</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
