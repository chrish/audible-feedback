name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build dist
        run: |
          mkdir -p dist/css/fonts dist/js
          cp webapp/index.html dist/
          cp webapp/css/style.css dist/css/
          cp webapp/css/fonts/Raleway-VariableFont_wght.ttf dist/css/fonts/
          cp webapp/js/app.js dist/js/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - id: deployment
        uses: actions/deploy-pages@v4
